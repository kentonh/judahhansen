<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://www.youtube.com" crossorigin>
  <link rel="preconnect" href="https://i.ytimg.com" crossorigin>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script defer src="{{ '/assets/js/gallery.js' | relative_url }}"></script>
  <script defer src="{{ '/assets/js/age-counter.js' | relative_url }}"></script>
  {% seo %}
</head>
<body>
  <header class="site-header">
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}" class="site-title">
        <img src="{{ '/assets/images/Judah_PBJ_Logo.svg' | relative_url }}" alt="" class="nav-logo">
        {{ site.title }}
      </a>
      <ul class="nav-links">
        <li><span class="age-counter" data-since="2003-10-21T16:56:00-05:00" aria-label="Age">…</span><span class="age-counter"> old</span></li>
      </ul>
    </nav>
  </header>

  <main class="site-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>&copy; {{ 'now' | date: '%Y' }} Judah Hansen</p>
  </footer>
</body>
</html>
