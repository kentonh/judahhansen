<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo %}
</head>
<body>
  <header class="site-header">
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}" class="site-title">
        <img src="{{ '/assets/images/Judah_PBJ_Logo.svg' | relative_url }}" alt="" class="nav-logo">
        {{ site.title }}
      </a>
      <ul class="nav-links">
        <li><a href="{{ '/hexominos/' | relative_url }}">Hexominos</a></li>
      </ul>
    </nav>
  </header>

  <main class="site-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>&copy; {{ 'now' | date: '%Y' }} Judah Hansen</p>
  </footer>
</body>
</html>
